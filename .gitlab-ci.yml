# ─── Kairos CI/CD Pipeline ────────────────────────────────────────────────────
#
# MR pipeline:   fmt, clippy, audit → test-lib, test-doc → [build: manual]
# Tag pipeline:  fmt, clippy, audit → test-lib, test-doc → build (5 jobs)
#                → collect-checksums → create-release

stages:
  - check
  - test
  - build
  - package
  - release

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  CARGO_TERM_COLOR: "always"
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: "short"
  FEATURES: "heatmap"

# ── Linux system dependencies ────────────────────────────────────────────────

.linux-deps: &linux-deps
  - apt-get update -qq
  - >-
    apt-get install -y -qq
    pkg-config libssl-dev libdbus-1-dev libxkbcommon-dev libwayland-dev
    libx11-dev libxrandr-dev libxcursor-dev libxi-dev libvulkan-dev
    libfontconfig1-dev libfreetype6-dev

# ── Cache templates ──────────────────────────────────────────────────────────

.cache-dev: &cache-dev
  cache:
    key: "${CI_RUNNER_OS}-dev-${CI_COMMIT_REF_SLUG}"
    fallback_keys:
      - "${CI_RUNNER_OS}-dev-main"
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/

.cache-release: &cache-release
  cache:
    key: "${CI_RUNNER_OS}-release-${CI_COMMIT_REF_SLUG}"
    fallback_keys:
      - "${CI_RUNNER_OS}-release-main"
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/

# ─── Stage: check ────────────────────────────────────────────────────────────

fmt:
  stage: check
  image: rust:latest
  <<: *cache-dev
  script:
    - rustup component add rustfmt
    - cargo fmt --check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG =~ /^v/

clippy:
  stage: check
  image: rust:latest
  <<: *cache-dev
  before_script:
    - *linux-deps
    - rustup component add clippy
  script:
    - cargo clippy --workspace --features "$FEATURES" -- -D warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG =~ /^v/

audit:
  stage: check
  image: rust:latest
  script:
    - cargo install cargo-audit --locked
    - cargo audit
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG =~ /^v/

# ─── Stage: test ─────────────────────────────────────────────────────────────

test-lib:
  stage: test
  image: rust:latest
  <<: *cache-dev
  needs: ["clippy"]
  before_script:
    - *linux-deps
  script:
    - cargo test --workspace --features "$FEATURES" --no-fail-fast
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG =~ /^v/

test-doc:
  stage: test
  image: rust:latest
  <<: *cache-dev
  needs: ["clippy"]
  before_script:
    - *linux-deps
  script:
    - cargo test --workspace --features "$FEATURES" --doc --no-fail-fast
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG =~ /^v/

# ─── Stage: build ────────────────────────────────────────────────────────────

.build-base:
  stage: build
  <<: *cache-release
  artifacts:
    paths:
      - target/release/kairos-*
    expire_in: 7 days

# ── Linux builds ─────────────────────────────────────────────────────────────

build-linux-x86_64:
  extends: .build-base
  image: rust:latest
  before_script:
    - *linux-deps
  script:
    - bash scripts/build-linux.sh --arch x86_64 --features "$FEATURES"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true

build-linux-aarch64:
  extends: .build-base
  image: rust:latest
  before_script:
    - *linux-deps
    - apt-get install -y -qq gcc-aarch64-linux-gnu
  script:
    - bash scripts/build-linux.sh --arch aarch64 --features "$FEATURES"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true

# ── Windows builds ───────────────────────────────────────────────────────────

build-windows-x86_64:
  extends: .build-base
  tags: [windows]
  script:
    - bash scripts/build-windows.sh --arch x86_64 --features "$FEATURES"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true

build-windows-aarch64:
  extends: .build-base
  tags: [windows]
  script:
    - bash scripts/build-windows.sh --arch aarch64 --features "$FEATURES"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true

# ── macOS build ──────────────────────────────────────────────────────────────

build-macos-universal:
  extends: .build-base
  tags: [macos]
  script:
    - bash scripts/build-macos.sh --arch universal --features "$FEATURES"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true

# ─── Stage: package ──────────────────────────────────────────────────────────

collect-checksums:
  stage: package
  image: alpine:latest
  needs:
    - job: build-linux-x86_64
      artifacts: true
    - job: build-linux-aarch64
      artifacts: true
    - job: build-windows-x86_64
      artifacts: true
    - job: build-windows-aarch64
      artifacts: true
    - job: build-macos-universal
      artifacts: true
  script:
    - |
      echo "Collecting checksums..."
      cd target/release
      cat *.sha256 > SHA256SUMS.txt || true
      echo "=== SHA256SUMS.txt ==="
      cat SHA256SUMS.txt
  artifacts:
    paths:
      - target/release/kairos-*
      - target/release/SHA256SUMS.txt
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

# ─── Stage: release ─────────────────────────────────────────────────────────

create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: collect-checksums
      artifacts: true
  variables:
    TAG: "${CI_COMMIT_TAG}"
  before_script:
    - apk add --no-cache curl
  script:
    - |
      VERSION="${TAG#v}"
      echo "Creating release for ${TAG} (version ${VERSION})"

      # Upload assets to Generic Package Registry
      for file in target/release/kairos-*.zip target/release/kairos-*.tar.gz target/release/SHA256SUMS.txt; do
        [ -f "$file" ] || continue
        filename="$(basename "$file")"
        echo "Uploading ${filename}..."
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$file" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${VERSION}/${filename}"
      done

      # Upload individual checksum files
      for file in target/release/kairos-*.sha256; do
        [ -f "$file" ] || continue
        filename="$(basename "$file")"
        echo "Uploading ${filename}..."
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$file" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${VERSION}/${filename}"
      done
  release:
    tag_name: "${CI_COMMIT_TAG}"
    name: "Kairos ${CI_COMMIT_TAG}"
    description: |
      ## Downloads

      | Platform | Architecture | File |
      |----------|-------------|------|
      | Windows  | x86_64      | [kairos-${TAG#v}-x86_64-pc-windows-msvc.zip](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${TAG#v}/kairos-${TAG#v}-x86_64-pc-windows-msvc.zip) |
      | Windows  | aarch64     | [kairos-${TAG#v}-aarch64-pc-windows-msvc.zip](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${TAG#v}/kairos-${TAG#v}-aarch64-pc-windows-msvc.zip) |
      | macOS    | Universal   | [kairos-${TAG#v}-universal-apple-darwin.tar.gz](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${TAG#v}/kairos-${TAG#v}-universal-apple-darwin.tar.gz) |
      | Linux    | x86_64      | [kairos-${TAG#v}-x86_64-unknown-linux-gnu.tar.gz](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${TAG#v}/kairos-${TAG#v}-x86_64-unknown-linux-gnu.tar.gz) |
      | Linux    | aarch64     | [kairos-${TAG#v}-aarch64-unknown-linux-gnu.tar.gz](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${TAG#v}/kairos-${TAG#v}-aarch64-unknown-linux-gnu.tar.gz) |

      **Checksums**: [SHA256SUMS.txt](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${TAG#v}/SHA256SUMS.txt)
    assets:
      links:
        - name: "kairos-${TAG#v}-x86_64-pc-windows-msvc.zip"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${TAG#v}/kairos-${TAG#v}-x86_64-pc-windows-msvc.zip"
          filepath: "/kairos-${TAG#v}-x86_64-pc-windows-msvc.zip"
        - name: "kairos-${TAG#v}-aarch64-pc-windows-msvc.zip"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${TAG#v}/kairos-${TAG#v}-aarch64-pc-windows-msvc.zip"
          filepath: "/kairos-${TAG#v}-aarch64-pc-windows-msvc.zip"
        - name: "kairos-${TAG#v}-universal-apple-darwin.tar.gz"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${TAG#v}/kairos-${TAG#v}-universal-apple-darwin.tar.gz"
          filepath: "/kairos-${TAG#v}-universal-apple-darwin.tar.gz"
        - name: "kairos-${TAG#v}-x86_64-unknown-linux-gnu.tar.gz"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${TAG#v}/kairos-${TAG#v}-x86_64-unknown-linux-gnu.tar.gz"
          filepath: "/kairos-${TAG#v}-x86_64-unknown-linux-gnu.tar.gz"
        - name: "kairos-${TAG#v}-aarch64-unknown-linux-gnu.tar.gz"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${TAG#v}/kairos-${TAG#v}-aarch64-unknown-linux-gnu.tar.gz"
          filepath: "/kairos-${TAG#v}-aarch64-unknown-linux-gnu.tar.gz"
        - name: "SHA256SUMS.txt"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${TAG#v}/SHA256SUMS.txt"
          filepath: "/SHA256SUMS.txt"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
