# ─── Kairos CI/CD Pipeline ────────────────────────────────────────────────────
#
# Push pipeline:  fmt, clippy, audit → test-lib, test-doc
# MR pipeline:    fmt, clippy, audit → test-lib, test-doc → [build: manual]
# Tag pipeline:   fmt, clippy, audit → test-lib, test-doc → build (4 jobs)
#                 → collect-checksums → create-release

stages:
  - check
  - test
  - build
  - package
  - release

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  CARGO_TERM_COLOR: "always"
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: "short"

# ── Linux system dependencies ────────────────────────────────────────────────

.linux-deps: &linux-deps
  - apt-get update -qq
  - >-
    apt-get install -y -qq
    pkg-config libssl-dev libdbus-1-dev libxkbcommon-dev libwayland-dev
    libx11-dev libxrandr-dev libxcursor-dev libxi-dev libvulkan-dev
    libfontconfig1-dev libfreetype6-dev

# ── Rust install templates (for hosted SaaS runners) ───────────────────────

.install-rust-windows:
  before_script:
    - Invoke-WebRequest -Uri https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe -OutFile rustup-init.exe
    - ./rustup-init.exe -y --default-toolchain stable
    - $env:PATH = "$env:CARGO_HOME\bin;$env:PATH"
    - rustc --version
    - cargo --version

.install-rust-macos:
  before_script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    - source "$CARGO_HOME/env"
    - rustc --version
    - cargo --version

# ── Cache templates ──────────────────────────────────────────────────────────
# Cache cargo registry/git only (dependency downloads). The target/ directory
# is too large for SaaS runner distributed cache and the upload/download cost
# exceeds compilation savings. Each platform template uses an explicit key
# prefix since CI_RUNNER_OS is not a standard GitLab CI variable.

.cache-linux: &cache-linux
  cache:
    key: "linux-${CI_COMMIT_REF_SLUG}"
    fallback_keys:
      - "linux-main"
    paths:
      - .cargo/registry/
      - .cargo/git/

.cache-windows: &cache-windows
  cache:
    key: "windows-${CI_COMMIT_REF_SLUG}"
    fallback_keys:
      - "windows-main"
    paths:
      - .cargo/registry/
      - .cargo/git/

.cache-macos: &cache-macos
  cache:
    key: "macos-${CI_COMMIT_REF_SLUG}"
    fallback_keys:
      - "macos-main"
    paths:
      - .cargo/registry/
      - .cargo/git/

# ─── Stage: check ────────────────────────────────────────────────────────────

fmt:
  stage: check
  image: rust:latest
  <<: *cache-linux
  script:
    - rustup component add rustfmt
    - cargo fmt --check

clippy:
  stage: check
  image: rust:latest
  <<: *cache-linux
  before_script:
    - *linux-deps
    - rustup component add clippy
  script:
    - cargo clippy --workspace -- -D warnings

audit:
  stage: check
  image: rust:latest
  script:
    - cargo install cargo-audit --locked
    - cargo audit
  allow_failure: true

# ─── Stage: test ─────────────────────────────────────────────────────────────

test-lib:
  stage: test
  image: rust:latest
  <<: *cache-linux
  needs: ["clippy"]
  before_script:
    - *linux-deps
  script:
    - cargo test --workspace --no-fail-fast

test-doc:
  stage: test
  image: rust:latest
  <<: *cache-linux
  needs: ["clippy"]
  before_script:
    - *linux-deps
  script:
    - cargo test --workspace --doc --no-fail-fast

# ─── Stage: build ────────────────────────────────────────────────────────────

.build-base:
  stage: build
  artifacts:
    paths:
      - target/release/kairos-*
    expire_in: 7 days

# ── Linux builds ─────────────────────────────────────────────────────────────

build-linux-x86_64:
  extends: .build-base
  image: rust:latest
  <<: *cache-linux
  before_script:
    - *linux-deps
  script:
    - bash scripts/build-linux.sh --arch x86_64
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - when: manual
      allow_failure: true

build-linux-aarch64:
  extends: .build-base
  image: rust:latest
  <<: *cache-linux
  before_script:
    - *linux-deps
    - apt-get install -y -qq gcc-aarch64-linux-gnu
  script:
    - bash scripts/build-linux.sh --arch aarch64
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - when: manual
      allow_failure: true

# ── Windows builds ───────────────────────────────────────────────────────────

build-windows-x86_64:
  extends:
    - .build-base
    - .install-rust-windows
  <<: *cache-windows
  tags: [saas-windows-medium-amd64]
  script:
    - $env:PATH = "$env:CARGO_HOME\bin;$env:PATH"
    - powershell -ExecutionPolicy Bypass -File scripts\build-windows.ps1 -Arch x86_64
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - when: manual
      allow_failure: true

# ── macOS build ──────────────────────────────────────────────────────────────

build-macos-universal:
  extends:
    - .build-base
    - .install-rust-macos
  <<: *cache-macos
  tags: [saas-macos-medium-m1]
  image: macos-15-xcode-16
  script:
    - source "$CARGO_HOME/env"
    - bash scripts/build-macos.sh --arch universal
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - when: manual
      allow_failure: true

# ─── Stage: package ──────────────────────────────────────────────────────────

collect-checksums:
  stage: package
  image: alpine:latest
  needs:
    - job: build-linux-x86_64
      artifacts: true
    - job: build-linux-aarch64
      artifacts: true
    - job: build-windows-x86_64
      artifacts: true
      optional: true
    - job: build-macos-universal
      artifacts: true
      optional: true
  script:
    - |
      echo "Collecting checksums..."
      cd target/release
      cat *.sha256 > SHA256SUMS.txt || true
      echo "=== SHA256SUMS.txt ==="
      cat SHA256SUMS.txt
  artifacts:
    paths:
      - target/release/kairos-*
      - target/release/SHA256SUMS.txt
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

# ─── Stage: release ─────────────────────────────────────────────────────────

create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: collect-checksums
      artifacts: true
  before_script:
    - apk add --no-cache curl
  script:
    - |
      echo "Creating release for ${CI_COMMIT_TAG}"

      # Upload assets to Generic Package Registry
      for file in target/release/kairos-*.zip target/release/kairos-*.tar.gz target/release/SHA256SUMS.txt; do
        [ -f "$file" ] || continue
        filename="$(basename "$file")"
        echo "Uploading ${filename}..."
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$file" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${CI_COMMIT_TAG}/${filename}"
      done

      # Upload individual checksum files
      for file in target/release/kairos-*.sha256; do
        [ -f "$file" ] || continue
        filename="$(basename "$file")"
        echo "Uploading ${filename}..."
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$file" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${CI_COMMIT_TAG}/${filename}"
      done
  release:
    tag_name: "${CI_COMMIT_TAG}"
    name: "Kairos ${CI_COMMIT_TAG}"
    description: |
      ## Downloads

      | Platform | Architecture | File |
      |----------|-------------|------|
      | Windows  | x86_64      | [kairos-${CI_COMMIT_TAG}-x86_64-pc-windows-msvc.zip](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${CI_COMMIT_TAG}/kairos-${CI_COMMIT_TAG}-x86_64-pc-windows-msvc.zip) |
      | macOS    | Universal   | [kairos-${CI_COMMIT_TAG}-universal-apple-darwin.tar.gz](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${CI_COMMIT_TAG}/kairos-${CI_COMMIT_TAG}-universal-apple-darwin.tar.gz) |
      | Linux    | x86_64      | [kairos-${CI_COMMIT_TAG}-x86_64-unknown-linux-gnu.tar.gz](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${CI_COMMIT_TAG}/kairos-${CI_COMMIT_TAG}-x86_64-unknown-linux-gnu.tar.gz) |
      | Linux    | aarch64     | [kairos-${CI_COMMIT_TAG}-aarch64-unknown-linux-gnu.tar.gz](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${CI_COMMIT_TAG}/kairos-${CI_COMMIT_TAG}-aarch64-unknown-linux-gnu.tar.gz) |

      **Checksums**: [SHA256SUMS.txt](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${CI_COMMIT_TAG}/SHA256SUMS.txt)
    assets:
      links:
        - name: "Windows (x86_64)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${CI_COMMIT_TAG}/kairos-${CI_COMMIT_TAG}-x86_64-pc-windows-msvc.zip"
          filepath: "/kairos-${CI_COMMIT_TAG}-x86_64-pc-windows-msvc.zip"
        - name: "macOS (Universal)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${CI_COMMIT_TAG}/kairos-${CI_COMMIT_TAG}-universal-apple-darwin.tar.gz"
          filepath: "/kairos-${CI_COMMIT_TAG}-universal-apple-darwin.tar.gz"
        - name: "Linux (x86_64)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${CI_COMMIT_TAG}/kairos-${CI_COMMIT_TAG}-x86_64-unknown-linux-gnu.tar.gz"
          filepath: "/kairos-${CI_COMMIT_TAG}-x86_64-unknown-linux-gnu.tar.gz"
        - name: "Linux (ARM64)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${CI_COMMIT_TAG}/kairos-${CI_COMMIT_TAG}-aarch64-unknown-linux-gnu.tar.gz"
          filepath: "/kairos-${CI_COMMIT_TAG}-aarch64-unknown-linux-gnu.tar.gz"
        - name: "SHA256 Checksums"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kairos/${CI_COMMIT_TAG}/SHA256SUMS.txt"
          filepath: "/SHA256SUMS.txt"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
